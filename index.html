<!DOCTYPE html>
<html lang="ur" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ISRA Quran Academy Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Naskh+Arabic:wght@400;600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
:root{
  --teal:#0F4C5C;
  --teal-dark:#0A363F;
  --gold:#F0A500;
  --cream:#FBF8F1;
  --sand:#F5E6CA;
  --charcoal:#2B2D2E;
  --green:#4A7C59;
  --red:#C0463A;
  --border:#E3DBC8;
  --shadow:0 2px 12px rgba(15,76,92,0.08);
  --radius:14px;
}
*{box-sizing:border-box; margin:0; padding:0;}
body{
  font-family:'Inter',sans-serif;
  background:var(--cream);
  color:var(--charcoal);
  min-height:100vh;
}
.urdu{font-family:'Noto Naskh Arabic', serif; direction:rtl;}
h1,h2,h3,h4{font-family:'Noto Naskh Arabic','Inter',serif; color:var(--teal-dark); font-weight:700;}

/* ===== Login Screen ===== */
#loginScreen{
  display:flex; align-items:center; justify-content:center;
  min-height:100vh; background:linear-gradient(135deg, var(--teal) 0%, var(--teal-dark) 100%);
  padding:20px;
}
.login-box{
  background:var(--cream); border-radius:20px; padding:40px 36px;
  width:100%; max-width:400px; box-shadow:0 20px 60px rgba(0,0,0,0.25);
  text-align:center; position:relative; overflow:hidden;
}
.login-box::before{
  content:''; position:absolute; top:-60px; right:-60px; width:160px; height:160px;
  background:var(--gold); border-radius:50%; opacity:0.15;
}
.login-logo{width:84px; height:84px; border-radius:50%; object-fit:cover; margin-bottom:14px; border:3px solid var(--gold);}
.login-box h1{font-size:24px; margin-bottom:4px;}
.login-box p.sub{color:#6b6f6e; font-size:13px; margin-bottom:24px;}
.field{margin-bottom:16px; text-align:right;}
.field label{display:block; font-size:13px; font-weight:600; margin-bottom:6px; color:var(--teal-dark);}
.field input, .field select{
  width:100%; padding:11px 14px; border:1.5px solid var(--border); border-radius:10px;
  font-size:14px; font-family:inherit; background:#fff; transition:border-color .2s;
}
.field input:focus, .field select:focus{outline:none; border-color:var(--gold);}
.btn{
  width:100%; padding:12px; border:none; border-radius:10px; background:var(--teal);
  color:#fff; font-weight:700; font-size:15px; cursor:pointer; transition:background .2s;
  font-family:inherit;
}
.btn:hover{background:var(--teal-dark);}
.btn-gold{background:var(--gold); color:var(--teal-dark);}
.btn-gold:hover{background:#d99000;}
.btn-outline{background:transparent; border:1.5px solid var(--teal); color:var(--teal);}
.btn-outline:hover{background:var(--teal); color:#fff;}
.btn-sm{width:auto; padding:8px 16px; font-size:13px;}
.error-msg{color:var(--red); font-size:13px; margin-top:10px; min-height:18px;}
.login-hint{margin-top:18px; font-size:12px; color:#999;}

/* ===== App Shell ===== */
#appShell{display:none; min-height:100vh;}
.app-grid{display:grid; grid-template-columns:240px 1fr; min-height:100vh;}
.sidebar{
  background:var(--teal-dark); color:#fff; padding:24px 16px; display:flex; flex-direction:column;
  position:sticky; top:0; height:100vh;
}
.sidebar-header{display:flex; align-items:center; gap:10px; margin-bottom:30px; padding:0 6px;}
.sidebar-header img{width:42px; height:42px; border-radius:50%; border:2px solid var(--gold);}
.sidebar-header div h2{color:#fff; font-size:15px; line-height:1.3; margin:0;}
.sidebar-header div span{font-size:11px; color:#9fc3cc;}
.nav-item{
  display:flex; align-items:center; gap:12px; padding:11px 14px; border-radius:10px;
  color:#cfe3e7; text-decoration:none; font-size:14px; font-weight:500; cursor:pointer;
  margin-bottom:4px; transition:all .15s; border:none; background:none; width:100%; text-align:left; font-family:inherit;
}
.nav-item:hover{background:rgba(255,255,255,0.08); color:#fff;}
.nav-item.active{background:var(--gold); color:var(--teal-dark); font-weight:700;}
.nav-icon{width:18px; text-align:center; font-size:16px;}
.sidebar-footer{margin-top:auto; padding-top:16px; border-top:1px solid rgba(255,255,255,0.1);}
.sidebar-user{font-size:12px; color:#9fc3cc; margin-bottom:10px; padding:0 6px;}
.sidebar-user b{color:#fff; display:block; font-size:13px;}

.main{padding:24px 32px; max-width:1400px; width:100%;}
.topbar{display:flex; justify-content:space-between; align-items:center; margin-bottom:24px; flex-wrap:wrap; gap:12px;}
.topbar h1{font-size:26px; margin:0;}
.topbar .sub{color:#7a7e7c; font-size:13px; margin-top:2px;}

/* Stat cards */
.stats-grid{display:grid; grid-template-columns:repeat(auto-fit, minmax(180px,1fr)); gap:16px; margin-bottom:28px;}
.stat-card{
  background:#fff; border-radius:var(--radius); padding:18px 20px; box-shadow:var(--shadow);
  border-right:4px solid var(--gold); position:relative; overflow:hidden;
}
.stat-card .num{font-size:30px; font-weight:800; color:var(--teal-dark); font-family:'Inter';}
.stat-card .lbl{font-size:13px; color:#7a7e7c; margin-top:4px;}
.stat-card.green{border-right-color:var(--green);}
.stat-card.red{border-right-color:var(--red);}
.stat-card.teal{border-right-color:var(--teal);}

/* Cards / panels */
.panel{background:#fff; border-radius:var(--radius); padding:24px; box-shadow:var(--shadow); margin-bottom:24px;}
.panel-header{display:flex; justify-content:space-between; align-items:center; margin-bottom:18px; flex-wrap:wrap; gap:10px;}
.panel-header h3{font-size:18px; margin:0;}

/* Tables */
.table-wrap{overflow-x:auto;}
table{width:100%; border-collapse:collapse; font-size:13.5px;}
th, td{padding:10px 12px; text-align:left; border-bottom:1px solid var(--border); white-space:nowrap;}
th{background:var(--sand); color:var(--teal-dark); font-weight:700; font-size:12.5px; text-transform:uppercase; letter-spacing:.4px;}
tr:hover{background:#fbfaf6;}
.badge{display:inline-block; padding:3px 10px; border-radius:20px; font-size:11.5px; font-weight:700;}
.badge.active{background:#e3f0e6; color:var(--green);}
.badge.dropout, .badge.left{background:#fbe6e3; color:var(--red);}

/* Forms */
.form-grid{display:grid; grid-template-columns:repeat(auto-fit, minmax(220px,1fr)); gap:14px;}
.form-grid .field{margin-bottom:0;}
.field-full{grid-column:1/-1;}

/* Map */
#mapPicker{height:320px; border-radius:10px; margin-top:10px; border:1.5px solid var(--border);}
.coord-display{font-size:12px; color:var(--teal-dark); margin-top:6px; font-weight:600;}

/* Tabs */
.tabs{display:flex; gap:6px; border-bottom:2px solid var(--border); margin-bottom:18px; flex-wrap:wrap;}
.tab{padding:10px 18px; cursor:pointer; font-weight:600; font-size:14px; color:#7a7e7c; border-bottom:3px solid transparent; transition:all .15s;}
.tab.active{color:var(--teal-dark); border-bottom-color:var(--gold);}

/* Loading / toast */
.spinner{display:inline-block; width:16px; height:16px; border:2px solid var(--border); border-top-color:var(--teal); border-radius:50%; animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.toast{
  position:fixed; bottom:24px; right:24px; background:var(--teal-dark); color:#fff;
  padding:14px 22px; border-radius:10px; font-size:14px; box-shadow:0 6px 20px rgba(0,0,0,.2);
  z-index:999; opacity:0; transform:translateY(10px); transition:all .3s; max-width:320px;
}
.toast.show{opacity:1; transform:translateY(0);}
.toast.error{background:var(--red);}
.toast.success{background:var(--green);}

.empty-state{text-align:center; padding:50px 20px; color:#9aa19f;}
.empty-state .glyph{font-size:40px; margin-bottom:10px; opacity:.5;}

.hidden{display:none !important;}

@media(max-width:860px){
  .app-grid{grid-template-columns:1fr;}
  .sidebar{position:relative; height:auto; flex-direction:row; overflow-x:auto; padding:12px;}
  .sidebar-header{display:none;}
  .sidebar-footer{display:none;}
  .nav-item{white-space:nowrap; margin-bottom:0;}
  .main{padding:16px;}
}
</style>
</head>
<body>

<!-- ===================== LOGIN SCREEN ===================== -->
<div id="loginScreen">
  <div class="login-box">
    <img src="ISRA_QURAN_ACADEMY_LOGO.jpeg" class="login-logo" alt="logo">
    <h1>اسرا قرآن اکیڈمی</h1>
    <p class="sub">ISRA Quran Academy &mdash; Maktab Management Portal</p>

    <div class="field">
      <label>صارف نام (Username)</label>
      <input type="text" id="loginUser" placeholder="username" autocomplete="username">
    </div>
    <div class="field">
      <label>پاس ورڈ (Password)</label>
      <input type="password" id="loginPass" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn btn-gold" id="loginBtn" onclick="doLogin()">لاگ ان <span id="loginSpin"></span></button>
    <div class="error-msg" id="loginError"></div>
    <div class="login-hint">Admin / Supervisor / Teacher login &mdash; account aap ke administrator se milega.</div>
  </div>
</div>

<!-- ===================== APP SHELL ===================== -->
<div id="appShell">
  <div class="app-grid">
    <!-- SIDEBAR -->
    <div class="sidebar">
      <div class="sidebar-header">
        <img src="ISRA_QURAN_ACADEMY_LOGO.jpeg" alt="logo">
        <div>
          <h2>ISRA Quran Academy</h2>
          <span>Maktab Portal</span>
        </div>
      </div>
      <nav id="navMenu"></nav>
      <div class="sidebar-footer">
        <div class="sidebar-user">
          Logged in as<br><b id="sidebarUserName">-</b>
          <span id="sidebarUserRole"></span>
        </div>
        <button class="nav-item" onclick="logout()"><span class="nav-icon">⏻</span> Logout</button>
      </div>
    </div>

    <!-- MAIN -->
    <div class="main">
      <div id="toast" class="toast"></div>
      <div id="pageContent"></div>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="config.js"></script>
<script src="app.js"></script>
</body>
</html>
